name: DEBUG

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-22.04

    steps:
      - name: Debug step
        run: |
          python3 << 'EOF'
          import requests

          print("STARTING DEBUG")

          url = "https://www.totalwine.com/search/all?text=makers+mark"

          headers = {
              "User-Agent": "Mozilla/5.0"
          }

          r = requests.get(url, headers=headers)

          print("STATUS:", r.status_code)
          print("LENGTH:", len(r.text))

          print("FIRST 300 CHARS:")
          print(r.text[:300])

          print("DONE")
          EOF
