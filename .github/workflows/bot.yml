name: Whiskey Sniper (Debug Test)

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-22.04

    steps:
      - name: Install deps
        run: pip install requests twilio

      - name: Run test
        env:
          TWILIO_SID: ${{ secrets.TWILIO_SID }}
          TWILIO_AUTH: ${{ secrets.TWILIO_AUTH }}
          TWILIO_NUMBER: ${{ secrets.TWILIO_NUMBER }}
          YOUR_NUMBER: ${{ secrets.YOUR_NUMBER }}
        run: |
          python3 << 'EOF'
          import requests
          import os
          from twilio.rest import Client

          print("START TEST")

          client = Client(os.environ["TWILIO_SID"], os.environ["TWILIO_AUTH"])
          FROM = os.environ["TWILIO_NUMBER"]
          TO = os.environ["YOUR_NUMBER"]

          def send_text(msg):
              print("SENDING:", msg)
              client.messages.create(body=msg, from_=FROM, to=TO)

          url = "https://www.totalwine.com/search/all?text=makers+mark"

          r = requests.get(url, headers={"User-Agent": "Mozilla/5.0"})
          text = r.text.lower()

          print("LENGTH:", len(text))

          # 🔥 FORCE DETECTION (guaranteed)
          if len(text) > 10000:
              send_text("TEST SUCCESS: Page loaded correctly")

          print("DONE")
          EOF
