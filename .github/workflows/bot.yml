name: Whiskey Sniper (Real Detection)

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-22.04

    steps:
      - name: Install deps
        run: pip install requests twilio

      - name: Run sniper
        env:
          TWILIO_SID: ${{ secrets.TWILIO_SID }}
          TWILIO_AUTH: ${{ secrets.TWILIO_AUTH }}
          TWILIO_NUMBER: ${{ secrets.TWILIO_NUMBER }}
          YOUR_NUMBER: ${{ secrets.YOUR_NUMBER }}
        run: |
          python3 << 'EOF'
          import requests
          import os
          from twilio.rest import Client

          print("🚀 REAL SNIPER STARTED")

          client = Client(os.environ["TWILIO_SID"], os.environ["TWILIO_AUTH"])
          FROM = os.environ["TWILIO_NUMBER"]
          TO = os.environ["YOUR_NUMBER"]

          def send_text(msg):
              print("SENDING:", msg)
              client.messages.create(body=msg, from_=FROM, to=TO)

          SEARCHES = {
              "Stagg": "stagg",
              "Weller": "weller",
              "Eagle Rare": "eagle rare",
              "Russell": "russell",
              "Makers Mark (TEST)": "makers mark"
          }

          alerted = set()

          for name, query in SEARCHES.items():
              print(f"\nChecking {name}")

              try:
                  url = f"https://www.totalwine.com/search/api/search?text={query}&pageSize=24"
                  r = requests.get(url)
                  data = r.json()

                  products = data.get("products", [])

                  if products:
                      msg = f"🔥 FOUND RESULTS: {name} ({len(products)} items)"
                      print(msg)

                      if msg not in alerted:
                          send_text(msg)
                          alerted.add(msg)
                  else:
                      print("No results")

              except Exception as e:
                  print("Error:", e)

          print("\n✅ DONE")
          EOF
