name: Debug Total Wine

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-22.04

    steps:
      - name: Run debug
        run: |
          python3 << 'EOF'
          import requests

          url = "https://www.totalwine.com/search/all?text=makers+mark"

          headers = {
              "User-Agent": "Mozilla/5.0",
              "Accept-Language": "en-US,en;q=0.9"
          }

          r = requests.get(url, headers=headers)

          print("STATUS:", r.status_code)
          print("LENGTH:", len(r.text))

          # Print first 1000 chars so we can see what's inside
          print("\n--- RESPONSE START ---\n")
          print(r.text[:1000])
          print("\n--- RESPONSE END ---")
          EOF
