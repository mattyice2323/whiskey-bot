name: Whiskey Sniper

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          pip install playwright twilio
          playwright install chromium

      - name: Run script
        env:
          TWILIO_SID: ${{ secrets.TWILIO_SID }}
          TWILIO_AUTH: ${{ secrets.TWILIO_AUTH }}
        run: |
          python3 << 'EOF'
          from playwright.sync_api import sync_playwright
          from twilio.rest import Client
          import os

          client = Client(os.environ["TWILIO_SID"], os.environ["TWILIO_AUTH"])

          def send(msg):
              print(msg)
              client.messages.create(
                  body=msg,
                  from_='whatsapp:+14155238886',
                  to='whatsapp:+16517885840'
              )

          PRODUCTS = {
              "Makers Mark Maple Grove": "https://www.totalwine.com/p/3700175?s=1605",
          }

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)

              context = browser.new_context(
                  user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64)",
                  locale="en-US"
              )

              page = context.new_page()

              # 🔥 IMPORTANT: visit homepage first (sets cookies/session)
              page.goto("https://www.totalwine.com", timeout=60000)
              page.wait_for_timeout(3000)

              for name, url in PRODUCTS.items():
                  print("Checking", name)

                  page.goto(url, timeout=60000)
                  page.wait_for_timeout(5000)

                  content = page.content().lower()

                  print("add to cart found?", "add to cart" in content)

                  if "add to cart" in content:
                      send(f"🔥 IN STOCK: {name}")
                  else:
                      send(f"❌ NOT DETECTED: {name}")

              browser.close()
          EOF
