name: Whiskey Sniper

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
  push:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python deps
        run: pip install requests twilio

      - name: Run script
        env:
          TWILIO_SID: ${{ secrets.TWILIO_SID }}
          TWILIO_AUTH: ${{ secrets.TWILIO_AUTH }}
        run: |
          python3 << 'EOF'
          import requests
          import os
          from datetime import datetime
          from twilio.rest import Client

          print("🚀 START")

          client = Client(os.environ["TWILIO_SID"], os.environ["TWILIO_AUTH"])

          def send(msg):
              print("TEXT:", msg)
              client.messages.create(
                  body=msg,
                  from_='whatsapp:+14155238886',
                  to='whatsapp:+16517885840'
              )

          HEADERS = {
              "User-Agent": "Mozilla/5.0",
              "Accept-Language": "en-US,en;q=0.9"
          }

          PRODUCTS = {
              "Makers Mark Maple Grove": "https://www.totalwine.com/spirits/deals/bourbon/small-batch-bourbon/makers-mark-bourbon-whisky/p/3700175?s=1605&igrules=true"
          }

          today = datetime.utcnow().strftime("%Y-%m-%d")
          heartbeat_file = "heartbeat.txt"

          already_sent_today = False
          if os.path.exists(heartbeat_file):
              with open(heartbeat_file, "r") as f:
                  if f.read() == today:
                      already_sent_today = True

          for name, url in PRODUCTS.items():
              print("Checking", name)

              try:
                  r = requests.get(url, headers=HEADERS, timeout=10)
                  text = r.text

                  # 🔥 REAL DETECTION
                  in_stock = (
                      "InStock" in text or
                      "instock" in text.lower() or
                      "inventoryStatus" in text
                  )

                  print("RAW CHECK:", "InStock" in text)
                  print(name, "IN STOCK?", in_stock)

                  if in_stock:
                      send(f"🔥 IN STOCK: {name}")

              except Exception as e:
                  print("error:", e)

          if not already_sent_today:
              send("✅ Bot running — daily check")
              with open(heartbeat_file, "w") as f:
                  f.write(today)

          print("✅ DONE")
          EOF
