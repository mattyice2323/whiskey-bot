name: Whiskey Sniper

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          pip install playwright twilio
          playwright install chromium

      - name: Run script
        env:
          TWILIO_SID: ${{ secrets.TWILIO_SID }}
          TWILIO_AUTH: ${{ secrets.TWILIO_AUTH }}
        run: |
          python3 << 'EOF'
          from playwright.sync_api import sync_playwright
          from twilio.rest import Client
          import os

          client = Client(os.environ["TWILIO_SID"], os.environ["TWILIO_AUTH"])

          def send(msg):
              print(msg)
              client.messages.create(
                  body=msg,
                  from_='whatsapp:+14155238886',
                  to='whatsapp:+16517885840'
              )

          PRODUCTS = {
              "Makers Mark Maple Grove": "https://www.totalwine.com/p/3700175?s=1605",
          }

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              context = browser.new_context()
              page = context.new_page()

              # 🔥 STEP 1: GO TO SITE
              page.goto("https://www.totalwine.com", timeout=60000)
              page.wait_for_timeout(3000)

              # 🔥 STEP 2: SET STORE (ZIP SEARCH)
              try:
                  page.click("text=Select Store")
                  page.fill("input[placeholder='Enter Zip Code']", "55369")
                  page.wait_for_timeout(2000)
                  page.click("text=Maple Grove")
                  page.wait_for_timeout(3000)
              except:
                  print("Store selection step failed — continuing anyway")

              # 🔥 STEP 3: CHECK PRODUCT
              for name, url in PRODUCTS.items():
                  print("Checking", name)

                  page.goto(url, timeout=60000)
                  page.wait_for_timeout(5000)

                  content = page.content().lower()

                  print("add to cart found?", "add to cart" in content)

                  if "add to cart" in content:
                      send(f"🔥 IN STOCK: {name}")
                  else:
                      send(f"❌ NOT DETECTED: {name}")

              browser.close()
          EOF
