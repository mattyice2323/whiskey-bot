name: Whiskey Sniper

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          pip install playwright twilio
          playwright install chromium

      - name: Run script
        env:
          TWILIO_SID: ${{ secrets.TWILIO_SID }}
          TWILIO_AUTH: ${{ secrets.TWILIO_AUTH }}
        run: |
          python3 << 'EOF'
          from playwright.sync_api import sync_playwright
          from twilio.rest import Client
          import os

          client = Client(os.environ["TWILIO_SID"], os.environ["TWILIO_AUTH"])

          def send(msg):
              print(msg)
              client.messages.create(
                  body=msg,
                  from_='whatsapp:+14155238886',
                  to='whatsapp:+16517885840'
              )

          url = "https://www.totalwine.com/spirits/deals/bourbon/small-batch-bourbon/makers-mark-bourbon-whisky/p/3700175?s=1605&igrules=true"

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              page = browser.new_page()

              print("Loading page...")
              page.goto(url, timeout=60000)

              # wait for page to fully load
              page.wait_for_timeout(5000)

              content = page.content().lower()

              print("=== PAGE CONTENT CHECK ===")
              print("add to cart" in content)
              print("pickup" in content)
              print("available" in content)

              # ALSO print a snippet so we see what’s actually there
              print(content[:2000])

              if "add to cart" in content:
                  send("🔥 FOUND ADD TO CART")
              else:
                  send("❌ NO ADD TO CART FOUND")

              browser.close()
          EOF
