name: Whiskey Sniper

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
  push:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python deps
        run: pip install requests twilio

      - name: Run script
        env:
          TWILIO_SID: ${{ secrets.TWILIO_SID }}
          TWILIO_AUTH: ${{ secrets.TWILIO_AUTH }}
        run: |
          python3 << 'EOF'
          import requests
          import os
          from twilio.rest import Client

          client = Client(os.environ["TWILIO_SID"], os.environ["TWILIO_AUTH"])

          def send(msg):
              print(msg)
              client.messages.create(
                  body=msg,
                  from_='whatsapp:+14155238886',
                  to='whatsapp:+16517885840'
              )

          PRODUCTS = {
              "Makers Mark": "makers-mark",
              "Eagle Rare": "eagle-rare",
              "Stagg": "stagg",
              "Weller Special Reserve": "weller-special-reserve",
              "Jack Daniels 10": "jack-daniels-10",
              "Jack Daniels 12": "jack-daniels-12",
              "Jack Daniels 14": "jack-daniels-14",
              "JD Tanyard Rye": "tanyard"
          }

          STORES = {
              "Maple Grove": "1605",
              "Minnetonka": "1608"
          }

          for product_name, keyword in PRODUCTS.items():
              for store_name, store_id in STORES.items():

                  try:
                      url = f"https://www.totalwine.com/search/api/product?text={keyword}&storeId={store_id}"

                      r = requests.get(url, timeout=10)
                      data = r.json()

                      found = False

                      for item in data.get("products", []):
                          name = item.get("name", "").lower()

                          if keyword in name:
                              if item.get("stockLevel", 0) > 0:
                                  found = True
                                  break

                      print(product_name, store_name, "IN STOCK?", found)

                      if found:
                          send(f"🔥 IN STOCK: {product_name} @ {store_name}")

                  except Exception as e:
                      print("error:", e)

          print("DONE")
          EOF
