name: Whiskey Sniper

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
  push:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python deps
        run: pip install requests twilio

      - name: Run script
        env:
          TWILIO_SID: ${{ secrets.TWILIO_SID }}
          TWILIO_AUTH: ${{ secrets.TWILIO_AUTH }}
        run: |
          python3 << 'EOF'
          import requests
          import os
          from datetime import datetime
          from twilio.rest import Client

          client = Client(os.environ["TWILIO_SID"], os.environ["TWILIO_AUTH"])

          def send(msg):
              print("TEXT:", msg)
              client.messages.create(
                  body=msg,
                  from_='whatsapp:+14155238886',
                  to='whatsapp:+16517885840'
              )

          # STORE IDS
          MAPLE_GROVE = "1605"
          MINNETONKA = "1608"

          PRODUCTS = {

              # MAKERS (TEST — SHOULD HIT)
              "Makers Mark Maple Grove": ("3700175", MAPLE_GROVE),
              "Makers Mark Minnetonka": ("3700175", MINNETONKA),

              # EAGLE RARE
              "Eagle Rare Maple Grove": ("98681752", MAPLE_GROVE),
              "Eagle Rare Minnetonka": ("98681752", MINNETONKA),

              # STAGG
              "Stagg Maple Grove": ("135217750", MAPLE_GROVE),
              "Stagg Minnetonka": ("135217750", MINNETONKA),

              # WELLER
              "Weller Special Reserve Maple Grove": ("13538750", MAPLE_GROVE),
              "Weller Special Reserve Minnetonka": ("13538750", MINNETONKA),

              # JACK DANIELS 10
              "Jack Daniels 10 Maple Grove": ("2126220956", MAPLE_GROVE),
              "Jack Daniels 10 Minnetonka": ("2126220956", MINNETONKA),

              # JACK DANIELS 12
              "Jack Daniels 12 Maple Grove": ("2126220955", MAPLE_GROVE),
              "Jack Daniels 12 Minnetonka": ("2126220955", MINNETONKA),

              # JACK DANIELS 14
              "Jack Daniels 14 Maple Grove": ("2126261899", MAPLE_GROVE),
              "Jack Daniels 14 Minnetonka": ("2126261899", MINNETONKA),

              # TANYARD RYE
              "JD Tanyard Maple Grove": ("2126270999", MAPLE_GROVE),
              "JD Tanyard Minnetonka": ("2126270999", MINNETONKA),
          }

          today = datetime.utcnow().strftime("%Y-%m-%d")
          heartbeat_file = "heartbeat.txt"

          already_sent_today = False
          if os.path.exists(heartbeat_file):
              with open(heartbeat_file, "r") as f:
                  if f.read() == today:
                      already_sent_today = True

          for name, (product_id, store_id) in PRODUCTS.items():
              print("Checking", name)

              try:
                  url = f"https://www.totalwine.com/product/api/product/{product_id}?storeId={store_id}"

                  r = requests.get(url, timeout=10)
                  data = r.json()

                  available = data.get("availability", {}).get("isInStock", False)

                  print(name, "API STOCK:", available)

                  if available:
                      send(f"🔥 IN STOCK: {name}")

              except Exception as e:
                  print("error:", e)

          if not already_sent_today:
              send("✅ Bot running — daily check")
              with open(heartbeat_file, "w") as f:
                  f.write(today)

          print("DONE")
          EOF
