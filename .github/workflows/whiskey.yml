name: Whiskey Sniper

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          pip install playwright twilio
          playwright install chromium

      - name: Run script
        env:
          TWILIO_SID: ${{ secrets.TWILIO_SID }}
          TWILIO_AUTH: ${{ secrets.TWILIO_AUTH }}
        run: |
          python3 << 'EOF'
          from playwright.sync_api import sync_playwright
          from twilio.rest import Client
          import os

          client = Client(os.environ["TWILIO_SID"], os.environ["TWILIO_AUTH"])

          def send(msg):
              print(msg)
              client.messages.create(
                  body=msg,
                  from_='whatsapp:+14155238886',
                  to='whatsapp:+16517885840'
              )

          PRODUCTS = {
              "Makers Mark Maple Grove": "https://www.totalwine.com/spirits/deals/bourbon/small-batch-bourbon/makers-mark-bourbon-whisky/p/3700175?s=1605&igrules=true",
              "Makers Mark Minnetonka": "https://www.totalwine.com/spirits/deals/bourbon/small-batch-bourbon/makers-mark-bourbon-whisky/p/3700175?s=1608&igrules=true",
          }

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              page = browser.new_page()

              for name, url in PRODUCTS.items():
                  print("Checking", name)

                  page.goto(url, timeout=60000)
                  content = page.content().lower()

                  if "add to cart" in content:
                      send(f"🔥 IN STOCK: {name}")
                  else:
                      print(name, "NOT in stock")

              browser.close()
          EOF
